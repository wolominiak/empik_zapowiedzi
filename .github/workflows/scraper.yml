name: Empik zapowiedzi do Supabase

on:
  schedule:
    - cron: "43 10,15,20 * * *" # 3x dziennie (UTC)
  workflow_dispatch: {}

concurrency:
  group: empik-zapowiedzi
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm install

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scraper.js
