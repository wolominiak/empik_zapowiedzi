name: Empik zapowiedzi scraper

on:
  schedule:
    # 3x dziennie (UTC): 10:43, 15:43, 20:43 - "krzywe" minuty omijaja tlok pelnych godzin
    - cron: "43 10,15,20 * * *"
  # Reczne uruchomienie z zakladki Actions - kluczowe do debugowania
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Zaleznosci
        run: pip install -r requirements.txt

      - name: Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scraper.py
